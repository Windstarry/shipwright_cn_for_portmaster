name: Build SOH Chinese Version

on:
  workflow_dispatch:
    inputs:
      sdl_version:
        description: 'SDL Version'
        required: true
        default: '2.32.0'
      force_rebuild:
        description: 'Force rebuild Docker images'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: windstarry/shipwright-cn-for-portmaster/portmaster-builder

jobs:
  build-builder-image:
    name: Build Builder Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            base_image: ubuntu:24.04
            platform: linux/amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            base_image: arm64v8/ubuntu:20.04
            platform: linux/arm64
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-latest" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check-image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-latest"
          if docker buildx imagetools inspect $IMAGE_TAG > /dev/null 2>&1; then
          echo "image_exists=true" >> $GITHUB_OUTPUT
          else
          echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push builder image
        if: steps.check-image.outputs.image_exists == 'false' || github.event.inputs.force_rebuild == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/pm_dockerfile.${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            SDL_VERSION=${{ github.event.inputs.sdl_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build ${{ matrix.arch }} Binary
    runs-on: ${{ matrix.runner }}
    needs: build-builder-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    outputs:
      port_name: ${{ steps.parse-json.outputs.port_name }}
      port_exe: ${{ steps.parse-json.outputs.port_exe }}
      port_title: ${{ steps.parse-json.outputs.port_title }}
      port_folder: ${{ steps.parse-json.outputs.port_folder }}
      port_version: ${{ steps.parse-json.outputs.port_version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse recipe.json and port.json
        id: parse-json
        run: |
          RECIPE_JSON_PATH="recipes/ports/soh/recipe.json"
          PORT_NAME=$(jq -r '.name' "$RECIPE_JSON_PATH")
          PORT_EXE=$(jq -r '.source.port_exe' "$RECIPE_JSON_PATH")
          PORT_VERSION=$(jq -r '.source.port_version' "$RECIPE_JSON_PATH")
          PORT_JSON="ports/soh/soh/port.json"
          PORT_TITLE=$(jq -r '.attr.title' "$PORT_JSON")
          echo "port_name=$PORT_NAME" >> $GITHUB_OUTPUT
          echo "port_exe=$PORT_EXE" >> $GITHUB_OUTPUT
          echo "port_version=$PORT_VERSION" >> $GITHUB_OUTPUT
          echo "port_title=$PORT_TITLE" >> $GITHUB_OUTPUT
          echo "port_folder=soh" >> $GITHUB_OUTPUT

      - name: Build in container (${{ matrix.arch }})
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            -e HOME=/tmp \
            --user $(id -u):$(id -g) \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-latest \
            /bin/bash -c "
            source recipes/ports/${{ steps.parse-json.outputs.port_folder }}/build.sh \
              '${{ steps.parse-json.outputs.port_folder }}' \
              'cmake' \
              '${{ steps.parse-json.outputs.port_exe }}' \
              '${{ matrix.arch }}'
            "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: soh-linux-${{ matrix.arch }}
          path: soh-linux-${{ matrix.arch }}.tar.gz
          retention-days: 7

  package:
    name: Package PortMaster
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: soh-linux-*
          merge-multiple: true

      - name: Extract binaries to ports directory
        run: |
          mkdir -p ports/soh/soh
          find artifacts -type f -name "*.tar.gz" | while read f; do
            tar -xzf "$f" -C ports/soh/soh/
          done

      - name: Fix line endings
        run: |
          find ports/soh/soh -type f \( -name "*.sh" -o -name "otrgen" \) -exec sed -i 's/\r$//' {} \; 2>/dev/null || true

      - name: Commit build results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add ports/soh/soh
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build SOH CN [$(date +%Y-%m-%d)]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PortMaster zip
        run: |
          cd ports/soh
          zip -r "../../soh.zip" .

      - name: Upload PortMaster package
        uses: actions/upload-artifact@v4
        with:
          name: soh-portmaster
          path: soh.zip
          retention-days: 7

      - name: Show package info
        run: |
          echo "=== Package Information ==="
          echo "Port Name: ${{ needs.build.outputs.port_title }}"
          echo "Port Folder: soh"
          echo "Port EXE: ${{ needs.build.outputs.port_exe }}"
          echo "==========================="

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: soh-*
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/soh-portmaster/soh.zip release/
          cp artifacts/soh-linux-x86_64/soh-linux-x86_64.tar.gz release/
          cp artifacts/soh-linux-aarch64/soh-linux-aarch64.tar.gz release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.port_version }}
          name: "Ship of Harkinian з®ҖдҪ“дёӯж–ҮзүҲ ${{ needs.build.outputs.port_version }}"
          body: |
            ## Ship of Harkinian з®ҖдҪ“дёӯж–ҮзүҲ

            еҹәдәҺ [Shipwright-CN](https://github.com/wonderfulnx/Shipwright-CN) зҡ„з®ҖдҪ“дёӯж–ҮзүҲпјҢзүҲжң?${{ needs.build.outputs.port_version }}гҖ?
            ### дёӯж–ҮзүҲзү№жҖ?            - 2115жқЎдёӯж–Үж¶ҲжҒҜж–Үжң¬пјҲжқҘиҮӘ iQue ROMпј?            - дёӯж–Ү UI зә№зҗҶпјҲеҠЁдҪңж ҮзӯҫгҖҒзү©е“ҒеҗҚз§°гҖҒең°еӣҫж Үзӯҫзӯүпј?            - иҮӘе®ҡд№?CJK еӯ—дҪ“пј?183дёӘеӯ—еҪўпјҢеҹәдәҺжҖқжәҗй»‘дҪ“пј?            - HD зә№зҗҶеҢ…ж”ҜжҢ?
            ### дёӢиҪҪж–Үд»¶
            | ж–Үд»¶ | иҜҙжҳҺ |
            |------|------|
            | `soh.zip` | PortMaster е®үиЈ…еҢ…пјҲжҺЁиҚҗпј?|
            | `soh-linux-x86_64.tar.gz` | x86_64 еҚ•зӢ¬жһ„е»ә |
            | `soh-linux-aarch64.tar.gz` | aarch64 еҚ•зӢ¬жһ„е»ә |

            ### е®үиЈ…ж–№жі•
            1. е°?`soh.zip` и§ЈеҺӢеҲ?PortMaster зҡ?`ports/` зӣ®еҪ•
            2. е°?OOT ROM ж–Үд»¶пјҲ`.z64`/`.n64`пјүж”ҫе…?`baseroms/` зӣ®еҪ•
            3. иҝҗиЎҢжёёжҲҸпјҢиҮӘеҠЁз”ҹжҲҗиө„жәҗеҢ…
            4. еңЁи®ҫзҪ?вҶ?иҜӯиЁҖдёӯйҖүжӢ©дёӯж–Ү

            ### иҮҙи°ў
            - [wonderfulnx/Shipwright-CN](https://github.com/wonderfulnx/Shipwright-CN) - дёӯж–Үжң¬ең°еҢ?            - [HarbourMasters/Shipwright](https://github.com/HarbourMasters/Shipwright) - еҺҹзүҲ SOH
            - [PortMaster](https://github.com/PortsMaster/PortMaster) - з§»жӨҚе№іеҸ°
          files: |
            release/soh.zip
            release/soh-linux-x86_64.tar.gz
            release/soh-linux-aarch64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
